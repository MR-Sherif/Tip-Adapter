# ------ root_path/dataset_name ------
root_path: '/home/user/codex/FewShot/TipAdapter/data'


# ------ Load Cache and Features ------
load_cache: False
load_pre_feat: False

# load_cache: True
# load_pre_feat: True


# ------ Hyperparamters ------
search_hp: True
# search_hp: False

search_scale: [30, 30]
search_step: [200, 20]

init_beta: 1
init_alpha: 5


# ------ Basic Config ------
dataset: 'aircrafts'
shots: 16
backbone: 'RN50'

lr: 0.001
augment_epoch: 10
train_epoch: 20
seed: 1

# Sequential evidence settings
seq_top_r: 5
seq_patch_k: 8
seq_max_steps: 3
seq_upsample_size: 14
seq_batch_size: 1

# Training schedule
eval_batch_size: 64
seq_imitation_epochs: 5
seq_imitation_lr: 0.001
seq_rl_epochs: 3
seq_rl_lr: 0.0001

# RL reward weights
seq_reward_alpha: 0.1
seq_reward_beta: 0.1
seq_reward_gamma: 0.002
